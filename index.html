<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.css">
</head>
<body>
    <header class="sticky-header">
        <section class="header-left">
            <button><img src="Images/header-images/side-bar-menu.png" class="icon menu-logo"></button>
            <a href="/"><img src="Images/header-images/header-logo.png" class="youtube-home-logo"></a>
        </section>
        <section class="header-middle">
            <form class="search-box" role="search">
                <input type="text" placeholder="Sök" class="search-input">
                <button type="button"><img src="Images/header-images/keyboard-logo.png" class="keyboard-logo"></button>
            </form>
            <button><img src="Images/header-images/search-logo.png" class="icon spy-logo"></button>
            <button><img src="Images/header-images/mic-logo.png" class="icon mic-logo"></button>
        </section>
        <section class="header-right">
            <button><img src="Images/header-images/create.logo.png" class="create-logo"></button>
            <button><img src="Images/header-images/bell-logo.png" class="icon bell-logo"></button>
            <button><img src="Images/header-images/profile-pic.png" class="profile-pic"></button>
        </section>
    </header>
</body>
</html>
